name = "domain-watch"
main = "src/worker.ts"
compatibility_date = "2025-05-26"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# KV Namespaces
# Run: wrangler kv:namespace create DOMAIN_WATCH_KV
# Then replace the id below with the output id
# ============================================================
[[kv_namespaces]]
binding = "KV"
id = "0732d5c2c7234a6792224ea7f9a23f20"
preview_id = "0732d5c2c7234a6792224ea7f9a23f20"

# ============================================================
# Cron Triggers - daily check at 08:00 UTC
# ============================================================
[triggers]
crons = ["0 8 * * *"]

# ============================================================
# Application Limits (edit these freely)
# ============================================================
[vars]

# Maximum number of domains that can be monitored at once
MAX_MONITORED_DOMAINS = "50"

# Maximum number of fuzzy scan history entries stored in KV
MAX_FUZZY_HISTORY = "100"

# Maximum number of domains in a single fuzzy scan batch
MAX_FUZZY_BATCH = "20"

# Alert thresholds in days (comma-separated) - default selection
# Users can override per-domain in the UI; this is the global default
DEFAULT_ALERT_THRESHOLDS = "90,60,30,14,7"

# Rate limiting: max requests per minute per IP
RATE_LIMIT_RPM = "60"

# Rate limiting: max RDAP/DNS lookups triggered per minute per IP
RATE_LIMIT_LOOKUPS_RPM = "20"

# Session cookie max age in seconds (default 8 hours)
SESSION_MAX_AGE = "28800"

# TLDs to check in fuzzy finder (comma-separated)
FUZZY_TLDS = ".com,.net,.org,.io,.co,.ai,.app,.dev,.info,.biz,.co.uk,.co.nz,.com.au"

# ============================================================
# Secrets - set via: wrangler secret put SECRET_NAME
# DO NOT put real values here - use `wrangler secret put`
# ============================================================
# Required:
#   APP_PASSWORD          - Login password for the UI
#   SESSION_SECRET        - Random 32+ char string for signing session tokens
#
# Email (at least one required for alerts):
#   RESEND_API_KEY        - From resend.com
#   MAILGUN_API_KEY       - From mailgun.com
#   MAILGUN_DOMAIN        - Your Mailgun sending domain
#   SENDGRID_API_KEY      - From sendgrid.com
#
# Email settings (can also be set in UI, stored in KV):
#   EMAIL_FROM            - Sender address e.g. alerts@yourdomain.com
#   EMAIL_TO              - Recipient address
#   EMAIL_SUBJECT_PREFIX  - e.g. [Domain Watch]
